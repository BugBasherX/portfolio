[build]
  command       = "npm run build"
  publish       = "dist"
  ignore        = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!*.md'"

[build.environment]
  NODE_VERSION = "24"
  NPM_FLAGS    = "--no-audit --no-fund"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
